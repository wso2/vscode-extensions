arazzo: "1.0.0"
info:
  title: "Test 09 - Request Body with Replacements"
  version: "1.0.0"
  description: >
    Tests request body features:
    - Direct payload with expression resolution
    - Replacements using JSON Pointer targets
    - Template string expressions in payload values

sourceDescriptions:
  - name: petstore
    url: ./petstore-openapi.yaml
    type: openapi

workflows:
  - workflowId: request_body_tests
    summary: Test request body handling with replacements
    inputs:
      type: object
      properties:
        petName:
          type: string
          default: "ReplacedPet"
        categoryName:
          type: string
          default: "ReplacedCategory"
    steps:
      - stepId: createWithReplacements
        description: "Create pet with JSON Pointer replacements"
        operationId: addPet
        requestBody:
          contentType: application/json
          payload:
            id: 22201
            name: "placeholder"
            photoUrls:
              - "https://example.com/photo.jpg"
            status: "available"
            category:
              id: 5
              name: "placeholder"
          replacements:
            - target: /name
              value: "$inputs.petName"
            - target: /category/name
              value: "$inputs.categoryName"
        successCriteria:
          - condition: "$statusCode == 200"
        outputs:
          petId: "$response.body#/id"
          petName: "$response.body#/name"
          categoryName: "$response.body#/category/name"

      - stepId: createWithTemplateExpressions
        description: "Create pet using template expressions in body"
        operationId: addPet
        requestBody:
          contentType: application/json
          payload:
            id: 22202
            name: "{$inputs.petName}-v2"
            photoUrls:
              - "https://example.com/photo.jpg"
            status: "available"
        successCriteria:
          - condition: "$statusCode == 200"
        outputs:
          petId: "$response.body#/id"
          petName: "$response.body#/name"

      - stepId: cleanupPet1
        operationId: deletePet
        parameters:
          - name: petId
            in: path
            value: "$steps.createWithReplacements.outputs.petId"

      - stepId: cleanupPet2
        operationId: deletePet
        parameters:
          - name: petId
            in: path
            value: "$steps.createWithTemplateExpressions.outputs.petId"

    outputs:
      replacedName: "$steps.createWithReplacements.outputs.petName"
      replacedCategory: "$steps.createWithReplacements.outputs.categoryName"
      templateName: "$steps.createWithTemplateExpressions.outputs.petName"
