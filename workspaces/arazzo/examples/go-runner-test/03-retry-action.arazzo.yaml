arazzo: "1.0.0"
info:
  title: "Test 03 - onFailure Retry Action"
  version: "1.0.0"
  description: >
    Tests the retry action on failure.
    Workflow 1: retry then goto fallback step (should complete successfully).
    Workflow 2: retry then end (should terminate with error - expected).

sourceDescriptions:
  - name: petstore
    url: ./petstore-openapi.yaml
    type: openapi

workflows:
  - workflowId: retry_then_goto_fallback
    summary: Retry on failure then goto a fallback step
    steps:
      - stepId: tryGetPet
        operationId: getPetById
        parameters:
          - name: petId
            in: path
            value: "888888888"
        successCriteria:
          - condition: "$statusCode == 200"
        onFailure:
          - name: retry_attempt
            type: retry
            retryAfter: 1
            retryLimit: 2
          - name: fallback_goto
            type: goto
            stepId: fallbackStep

      - stepId: shouldBeSkipped
        operationId: getInventory
        successCriteria:
          - condition: "$statusCode == 200"
        outputs:
          inventory: "$response.body"

      - stepId: fallbackStep
        operationId: findPetsByStatus
        parameters:
          - name: status
            in: query
            value: "available"
        successCriteria:
          - condition: "$statusCode == 200"
        outputs:
          foundPets: "$statusCode"

    outputs:
      fallbackResult: "$steps.fallbackStep.outputs.foundPets"
      shouldBeSkippedRan: "$steps.shouldBeSkipped.outputs.inventory"

  - workflowId: expect_error_retry_then_end
    summary: Retry on failure then end workflow (expected error)
    steps:
      - stepId: tryGetPet
        operationId: getPetById
        parameters:
          - name: petId
            in: path
            value: "888888888"
        successCriteria:
          - condition: "$statusCode == 200"
        onFailure:
          - name: retry_attempt
            type: retry
            retryAfter: 1
            retryLimit: 2
          - name: give_up
            type: end

      - stepId: shouldNotRun
        operationId: getInventory
        successCriteria:
          - condition: "$statusCode == 200"

    outputs:
      shouldNotExist: "$steps.shouldNotRun.outputs.inventory"
