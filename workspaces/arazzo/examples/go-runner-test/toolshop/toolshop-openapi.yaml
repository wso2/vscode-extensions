openapi: "3.0.0"
info:
  title: Toolshop API
  description: Practice Software Testing - Toolshop REST API (Subset for Arazzo testing)
  version: "5.0.0"
servers:
  - url: https://api.practicesoftwaretesting.com
paths:
  /brands:
    get:
      operationId: getBrands
      summary: Retrieve all brands
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Brand"
  /brands/{brandId}:
    get:
      operationId: getBrand
      summary: Retrieve specific brand
      parameters:
        - name: brandId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Brand"
        "404":
          description: Brand not found
  /brands/search:
    get:
      operationId: searchBrand
      summary: Search brands by name
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Brand"
  /categories:
    get:
      operationId: getCategories
      summary: Retrieve all categories
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
  /categories/tree:
    get:
      operationId: getCategoriesTree
      summary: Retrieve all categories with subcategories
      parameters:
        - name: by_category_slug
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CategoryTree"
  /categories/tree/{categoryId}:
    get:
      operationId: getCategory
      summary: Retrieve specific category with subcategories
      parameters:
        - name: categoryId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CategoryTree"
        "404":
          description: Category not found
  /categories/search:
    get:
      operationId: searchCategory
      summary: Search categories by name
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
  /products:
    get:
      operationId: getProducts
      summary: Retrieve all products (paginated)
      parameters:
        - name: by_brand
          in: query
          required: false
          schema:
            type: string
          description: Filter by brand ID
        - name: by_category
          in: query
          required: false
          schema:
            type: string
          description: Filter by category ID
        - name: is_rental
          in: query
          required: false
          schema:
            type: string
          description: Filter rental products
        - name: between
          in: query
          required: false
          schema:
            type: string
          description: "Price range filter (e.g., price,1,100)"
        - name: sort
          in: query
          required: false
          schema:
            type: string
          description: "Sort (e.g., name,asc or price,desc)"
        - name: page
          in: query
          required: false
          schema:
            type: integer
          description: Page number
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedProducts"
  /products/{productId}:
    get:
      operationId: getProduct
      summary: Retrieve specific product
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Product not found
  /products/{productId}/related:
    get:
      operationId: getRelatedProducts
      summary: Retrieve related products
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
  /products/search:
    get:
      operationId: searchProduct
      summary: Search products by name
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
        - name: page
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedProducts"
  /products/{productId}/specs:
    get:
      operationId: getProductSpecs
      summary: Retrieve specs for a product
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProductSpec"
  /product-specs/names:
    get:
      operationId: getSpecNames
      summary: Retrieve all distinct spec names with values
      responses:
        "200":
          description: Successful operation
  /carts:
    post:
      operationId: createCart
      summary: Create a new cart
      responses:
        "201":
          description: Cart created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CartCreated"
  /carts/{cartId}:
    get:
      operationId: getCart
      summary: Retrieve specific cart
      parameters:
        - name: cartId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cart"
        "404":
          description: Cart not found
    post:
      operationId: addItem
      summary: Add item to cart
      parameters:
        - name: cartId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddItemRequest"
      responses:
        "200":
          description: Item added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddItemResponse"
  /carts/{cartId}/product/quantity:
    put:
      operationId: updateCartQuantity
      summary: Update quantity of item in cart
      parameters:
        - name: cartId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddItemRequest"
      responses:
        "200":
          description: Successful operation
  /messages:
    post:
      operationId: sendMessage
      summary: Send new contact message
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactRequest"
      responses:
        "200":
          description: Message sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
  /payment/check:
    post:
      operationId: checkPayment
      summary: Check payment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentRequest"
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentResponse"
  /users/login:
    post:
      operationId: loginCustomer
      summary: Login customer
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: A token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
  /images:
    get:
      operationId: getImages
      summary: Retrieve all images
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Image"
components:
  schemas:
    Brand:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
    Category:
      type: object
      properties:
        id:
          type: string
        parent_id:
          type: string
        name:
          type: string
        slug:
          type: string
    CategoryTree:
      type: object
      properties:
        id:
          type: string
        parent_id:
          type: string
        name:
          type: string
        slug:
          type: string
        sub_categories:
          type: array
          items:
            $ref: "#/components/schemas/Category"
    Product:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        price:
          type: number
        is_location_offer:
          type: boolean
        is_rental:
          type: boolean
        in_stock:
          type: boolean
        co2_rating:
          type: string
        is_eco_friendly:
          type: boolean
        brand:
          $ref: "#/components/schemas/Brand"
        category:
          $ref: "#/components/schemas/Category"
        product_image:
          $ref: "#/components/schemas/Image"
    PaginatedProducts:
      type: object
      properties:
        current_page:
          type: integer
        data:
          type: array
          items:
            $ref: "#/components/schemas/Product"
        from:
          type: integer
        last_page:
          type: integer
        per_page:
          type: integer
        to:
          type: integer
        total:
          type: integer
    ProductSpec:
      type: object
      properties:
        id:
          type: string
        product_id:
          type: string
        spec_name:
          type: string
        spec_value:
          type: string
        spec_unit:
          type: string
          nullable: true
    CartCreated:
      type: object
      properties:
        id:
          type: string
    Cart:
      type: object
      properties:
        id:
          type: string
    AddItemRequest:
      type: object
      required:
        - product_id
        - quantity
      properties:
        product_id:
          type: string
        quantity:
          type: integer
    AddItemResponse:
      type: object
      properties:
        result:
          type: string
    ContactRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        subject:
          type: string
        message:
          type: string
    MessageResponse:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
        subject:
          type: string
        message:
          type: string
        status:
          type: string
        created_at:
          type: string
    PaymentRequest:
      type: object
      properties:
        payment_method:
          type: string
          enum:
            - bank-transfer
            - cash-on-delivery
            - credit-card
            - buy-now-pay-later
            - gift-card
        payment_details:
          type: object
    PaymentResponse:
      type: object
      properties:
        message:
          type: string
    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
        password:
          type: string
    TokenResponse:
      type: object
      properties:
        access_token:
          type: string
        token_type:
          type: string
        expires_in:
          type: number
    Image:
      type: object
      properties:
        id:
          type: string
        by_name:
          type: string
        by_url:
          type: string
        source_name:
          type: string
        source_url:
          type: string
        file_name:
          type: string
        title:
          type: string
