arazzo: "1.0.0"
info:
  title: "Test 11 - Response Header Extraction"
  version: "1.0.0"
  description: >
    Tests $response.header expressions to extract HTTP response headers.
    Verifies case-insensitive header access and combining header values
    with body outputs.

sourceDescriptions:
  - name: toolshop
    url: ./toolshop-openapi.yaml
    type: openapi

workflows:
  - workflowId: response_header_tests
    summary: Test extracting values from HTTP response headers
    steps:
      - stepId: getBrandsWithHeaders
        description: "Get brands and extract Content-Type header"
        operationId: getBrands
        successCriteria:
          - condition: "$statusCode == 200"
        outputs:
          contentType: "$response.header.Content-Type"
          server: "$response.header.Server"
          firstBrandName: "$response.body#/0/name"
          statusCode: "$statusCode"

      - stepId: getProductWithHeaders
        description: "Get a product and extract headers alongside body data"
        operationId: getProducts
        parameters:
          - name: page
            in: query
            value: "1"
        successCriteria:
          - condition: "$statusCode == 200"
        outputs:
          contentType: "$response.header.Content-Type"
          cacheControl: "$response.header.Cache-Control"
          firstProductName: "$response.body#/data/0/name"
          totalProducts: "$response.body#/total"

      - stepId: postMessageWithHeaders
        description: "POST a message and extract headers from POST response"
        operationId: sendMessage
        requestBody:
          contentType: application/json
          payload:
            name: "Header Test"
            email: "headertest@example.com"
            subject: "Headers"
            message: "Testing response header extraction"
        successCriteria:
          - condition: "$statusCode == 200"
        outputs:
          contentType: "$response.header.Content-Type"
          messageId: "$response.body#/id"

    outputs:
      brandsContentType: "$steps.getBrandsWithHeaders.outputs.contentType"
      brandsServer: "$steps.getBrandsWithHeaders.outputs.server"
      brandsFirstName: "$steps.getBrandsWithHeaders.outputs.firstBrandName"
      productsContentType: "$steps.getProductWithHeaders.outputs.contentType"
      productsCacheControl: "$steps.getProductWithHeaders.outputs.cacheControl"
      productsFirstName: "$steps.getProductWithHeaders.outputs.firstProductName"
      messageContentType: "$steps.postMessageWithHeaders.outputs.contentType"
      messageId: "$steps.postMessageWithHeaders.outputs.messageId"
