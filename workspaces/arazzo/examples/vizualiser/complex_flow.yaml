arazzo: 1.0.0
info:
  title: Advanced Multi-Service Order Fulfillment Workflow
  description: >-
    A highly complex orchestration of multiple microservices including Order, Inventory, Payment, Shipping, and Notifications.
    This workflow demonstrates advanced branching logic, conditional fallbacks, retry loops, and cross-service data propagation.
  version: 2.1.0

sourceDescriptions:
  - name: OrderService
    url: https://api.example.com/orders/v1/openapi.yaml
    type: openapi
  - name: InventoryService
    url: https://api.example.com/inventory/v1/openapi.yaml
    type: openapi
  - name: PaymentService
    url: https://api.example.com/payments/v2/openapi.yaml
    type: openapi
  - name: ShippingService
    url: https://api.example.com/shipping/v1/openapi.yaml
    type: openapi
  - name: NotificationService
    url: https://api.example.com/notify/v1/openapi.yaml
    type: openapi

workflows:
  - workflowId: complexOrderFulfillment
    summary: Orchestrates a complete order journey from validation to shipping.
    description: >-
      This workflow handles complex inventory scenarios (local vs remote), payment retries, 
      tax calculations based on shipping location, and notifications.
    inputs:
      type: object
      required:
        - customerId
        - items
        - shippingAddress
        - paymentMethod
      properties:
        customerId:
          type: string
          format: uuid
        items:
          type: array
          minItems: 1
          items:
            type: object
            required: [sku, quantity]
            properties:
              sku: { type: string }
              quantity: { type: integer, minimum: 1 }
        shippingAddress:
          type: object
          required: [street, city, country, postalCode]
          properties:
            street: { type: string }
            city: { type: string }
            country: { type: string, minLength: 2, maxLength: 2 }
            postalCode: { type: string }
        paymentMethod:
          type: object
          required: [type, details]
          properties:
            type: { type: string, enum: [credit_card, paypal, crypto] }
            details: { type: object }

    steps:
      - stepId: validateOrderDetails
        description: Initial validation of the order's business rules.
        operationId: OrderService.validateOrder
        requestBody:
          contentType: application/json
          payload:
            customerId: "{$inputs.customerId}"
            items: "{$inputs.items}"
        successCriteria:
          - condition: $statusCode == 200
        onSuccess:
          - name: proceedToInventory
            type: goto
            stepId: checkLocalInventory
        onFailure:
          - name: invalidOrder
            type: end
            criteria:
              - condition: $statusCode == 400

      - stepId: checkLocalInventory
        description: Check if items are available in the primary warehouse.
        operationId: InventoryService.checkStock
        parameters:
          - name: warehouseId
            in: query
            value: "WH-001"
        requestBody:
          contentType: application/json
          payload:
            items: "{$inputs.items}"
        successCriteria:
          - condition: $statusCode == 200
        onSuccess:
          - name: localStockAvailable
            type: goto
            stepId: reserveStock
            criteria:
              - condition: $response.body.allInStock == true
          - name: localStockMissing
            type: goto
            stepId: checkGlobalInventory
            criteria:
              - condition: $response.body.allInStock == false
        outputs:
          inventorySession: $response.body.sessionId

      - stepId: checkGlobalInventory
        description: Fallback to global warehouses if local stock is insufficient.
        operationId: InventoryService.checkGlobalStock
        requestBody:
          contentType: application/json
          payload:
            items: "{$inputs.items}"
            excludeWarehouse: "WH-001"
        successCriteria:
          - condition: $statusCode == 200
          - condition: $response.body.available == true
        onFailure:
          - name: outOfStockEverywhere
            type: end
            criteria:
              - condition: $response.body.available == false
        outputs:
          globalWarehouseId: $response.body.warehouseId

      - stepId: reserveStock
        description: Lock the inventory for this order.
        operationId: InventoryService.reserveItems
        requestBody:
          contentType: application/json
          payload:
            sessionId: "{$steps.checkLocalInventory.outputs.inventorySession}"
            warehouseId: "{$steps.checkGlobalInventory.outputs.globalWarehouseId || 'WH-001'}"
        successCriteria:
          - condition: $statusCode == 201
        outputs:
          reservationId: $response.body.reservationId

      - stepId: calculateTotal
        description: Calculate taxes and shipping costs.
        operationId: OrderService.calculateCosts
        requestBody:
          contentType: application/json
          payload:
            items: "{$inputs.items}"
            destination: "{$inputs.shippingAddress}"
        successCriteria:
          - condition: $statusCode == 200
        outputs:
          totalAmount: $response.body.total
          currency: $response.body.currency
          taxAmount: $response.body.tax

      - stepId: processPayment
        description: Execute payment transaction.
        operationId: PaymentService.authorizePayment
        requestBody:
          contentType: application/json
          payload:
            amount: "{$steps.calculateTotal.outputs.totalAmount}"
            currency: "{$steps.calculateTotal.outputs.currency}"
            method: "{$inputs.paymentMethod}"
        successCriteria:
          - condition: $statusCode == 200
        onFailure:
          - name: paymentRetryRequired
            type: goto
            stepId: requestAlternativePayment
            criteria:
              - condition: $response.body.errorCode == 'INSUFFICIENT_FUNDS'
          - name: fatalPaymentError
            type: goto
            stepId: cancelOrder
            criteria:
              - condition: $statusCode >= 500
        outputs:
          transactionId: $response.body.transactionId

      - stepId: requestAlternativePayment
        description: Notify user to update payment method and loop back.
        operationId: NotificationService.sendPaymentRequest
        requestBody:
          contentType: application/json
          payload:
            customerId: "{$inputs.customerId}"
            reason: "Payment Failed"
        successCriteria:
          - condition: $statusCode == 200
        onSuccess:
          - name: waitAndRetry
            type: goto
            stepId: processPayment
            # In a real system this might have a delay or external trigger
            
      - stepId: createShipment
        description: Create shipping label and schedule pickup.
        operationId: ShippingService.bookShipment
        requestBody:
          contentType: application/json
          payload:
            orderId: "{$steps.validateOrderDetails.outputs.orderId}"
            address: "{$inputs.shippingAddress}"
            items: "{$inputs.items}"
        successCriteria:
          - condition: $statusCode == 201
        outputs:
          trackingNumber: $response.body.trackingNumber
          carrier: $response.body.carrier

      - stepId: finalizeOrder
        description: Commit order to database.
        operationId: OrderService.completeOrder
        requestBody:
          contentType: application/json
          payload:
            orderId: "{$steps.validateOrderDetails.outputs.orderId}"
            paymentId: "{$steps.processPayment.outputs.transactionId}"
            shippingId: "{$steps.createShipment.outputs.trackingNumber}"
        successCriteria:
          - condition: $statusCode == 200

      - stepId: sendConfirmation
        description: Send final confirmation to the customer.
        operationId: NotificationService.notifySuccess
        requestBody:
          contentType: application/json
          payload:
            email: "{$inputs.customerEmail}" # Hypothetical extra field
            message: "Your order is on its way! Tracking: {$steps.createShipment.outputs.trackingNumber}"
        successCriteria:
          - condition: $statusCode == 200
        type: end

      - stepId: cancelOrder
        description: Rollback inventory if payment fails.
        operationId: InventoryService.releaseReservation
        parameters:
          - name: reservationId
            in: path
            value: "{$steps.reserveStock.outputs.reservationId}"
        successCriteria:
          - condition: $statusCode == 204
        type: end

    outputs:
      orderStatus: "completed"
      finalTrackingNumber: "{$steps.createShipment.outputs.trackingNumber}"
      totalPaid: "{$steps.calculateTotal.outputs.totalAmount}"
