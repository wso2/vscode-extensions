           - credit-card
           - buy-now-pay-later
           - gift-card
        payment_details:
          type: object
          oneOf:
           -
            $ref: "#/components/schemas/BankTransferDetails"
           -
            $ref: "#/components/schemas/CreditCardDetails"
           -
            $ref: "#/components/schemas/GiftCardDetails"
