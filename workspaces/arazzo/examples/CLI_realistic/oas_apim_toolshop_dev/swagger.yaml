          type: string
        id:
          type: string
    UserRequest:
      title: UserRequest
      required:
       - email
       - first_name
       - last_name
       - password
      type: object
      properties:
        first_name:
          maxLength: 40
          type: string
          example: John
        last_name:
          maxLength: 20
          type: string
          example: Doe
        address:
          type: object
          properties:
            street:
              maxLength: 70
              type: string
              example: Street 1
            city:
              maxLength: 40
              type: string
              example: City
            state:
              maxLength: 40
              type: string
              example: State
            country:
              maxLength: 40
              type: string
              example: Country
            postal_code:
              maxLength: 10
              type: string
              example: 1234AA
        phone:
          maxLength: 24
          type: string
          example: "0987654321"
        dob:
          type: string
          description: Must be a valid date between 18 and 75 years ago
          format: date
          example: 1970-01-01
        password:
          minLength: 8
          type: string
          description: "Must include uppercase, lowercase, number, and symbol"
          format: password
          example: SuperSecure@123
        email:
          maxLength: 256
          type: string
          format: email
          example: john@doe.example
    UserResponse:
      title: UserResponse
      type: object
      properties:
        first_name:
          type: string
          example: John
        last_name:
          type: string
          example: Doe
        address:
          type: object
          properties:
            street:
              type: string
              example: Street 1
            city:
              type: string
              example: City
            state:
              type: string
              example: State
            country:
              type: string
              example: Country
            postal_code:
              type: string
              example: 1234AA
        phone:
          type: string
          example: "0987654321"
        dob:
          type: string
          example: 1970-01-01
        email:
          type: string
          example: john@doe.example
        id:
          type: string
        provider:
          type: string
        totp_enabled:
          type: boolean
        enabled:
          type: boolean
        failed_login_attempts:
          type: integer
          nullable: true
        created_at:
          type: string
          example: 2022-08-01 08:24:56
  responses:
    UpdateResponse:
      description: Result of the update
      content:
        application/json:
          schema:
            title: UpdateResponse
            type: object
            properties:
              success:
                type: boolean
                example: true
    UnauthorizedResponse:
      description: Returns when user is not authenticated
      content:
        application/json:
          schema:
            title: UnauthorizedResponse
            type: object
            properties:
              message:
                type: string
                example: Unauthorized
    ItemNotFoundResponse:
      description: Returns when the resource is not found
      content:
        application/json:
          schema:
            title: ItemNotFoundResponse
            type: object
            properties:
              message:
                type: string
                example: Requested item not found
    ResourceNotFoundResponse:
      description: Returns when the resource is not found
      content:
        application/json:
          schema:
            title: ResourceNotFoundResponse
            type: object
            properties:
              message:
                type: string
                example: Resource not found
    ConflictResponse:
      description: Returns when the entity is used elsewhere
    MethodNotAllowedResponse:
      description: Returns when the method is not allowed for the requested route
      content:
        application/json:
          schema:
            title: MethodNotAllowedResponse
            type: object
            properties:
              message:
                type: string
                example: Method is not allowed for the requested route
    UnprocessableEntityResponse:
      description: Returns when the server was not able to process the content
  securitySchemes:
    apiAuth:
      type: http
      description: Login with email and password to get the authentication token
      scheme: bearer
      bearerFormat: JWT
    default:
      type: oauth2
      flows:
        implicit:
          authorizationUrl: https://test.com
          scopes: {}
