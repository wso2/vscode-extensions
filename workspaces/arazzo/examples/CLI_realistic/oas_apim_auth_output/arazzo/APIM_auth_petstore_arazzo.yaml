arazzo: 1.0.1
info:
  title: APIM Petstore Auth Workflows
  version: 1.0.0
  description: >-
    Pet workflows against a WSO2 API Manager petstore deployment.
    Authentication is via the Internal-Key header.

sourceDescriptions:
  - name: petstoreApim
    url: petstore_apim.yaml
    type: openapi

workflows:
  # ── Workflow 1: Look up a pet by ID ────────────────────────────
  - workflowId: lookupPet
    summary: Look up a pet by its ID (requires Internal-Key auth).
    inputs:
      type: object
      properties:
        petId:
          type: integer
          description: The ID of the pet to look up
        internalKey:
          type: string
          description: WSO2 APIM Internal-Key token for authentication
    outputs:
      petDetails: $steps.fetchPet.outputs.pet

    steps:
      - stepId: fetchPet
        description: Fetch a pet by ID using the Internal-Key header.
        operationId: getPetById
        parameters:
          - name: petId
            in: path
            value: $inputs.petId
          - name: Internal-Key
            in: header
            value: $inputs.internalKey
        successCriteria:
          - condition: $statusCode == 200
        outputs:
          pet: $response.body

  # ── Workflow 2: Create a pet and verify it ─────────────────────
  - workflowId: createAndVerifyPet
    summary: Add a new pet then look it up to verify (requires Internal-Key auth).
    inputs:
      type: object
      properties:
        petId:
          type: integer
          description: ID for the new pet
        petName:
          type: string
          description: Name of the new pet
        authToken:
          type: string
          description: WSO2 APIM Internal-Key token for authentication
    outputs:
      createdPet: $steps.verifyPet.outputs.pet

    steps:
      - stepId: addPet
        description: Add a new pet to the store.
        operationId: addPet
        parameters:
          - name: Internal-Key
            in: header
            value: $inputs.authToken
        requestBody:
          contentType: application/json
          payload:
            id: $inputs.petId
            name: $inputs.petName
            category:
              id: 1
              name: Dogs
            photoUrls:
              - https://example.com/pet.jpg
            status: available
        successCriteria:
          - condition: $statusCode == 200

      - stepId: verifyPet
        description: Verify the pet was created by fetching it.
        operationId: getPetById
        parameters:
          - name: petId
            in: path
            value: $inputs.petId
          - name: Internal-Key
            in: header
            value: $inputs.authToken
        successCriteria:
          - condition: $statusCode == 200
        outputs:
          pet: $response.body
