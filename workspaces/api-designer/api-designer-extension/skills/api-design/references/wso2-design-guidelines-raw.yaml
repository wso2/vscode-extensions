aliases:
  API_Document:
    description: "The complete API specification document. This can be used to target any part of the OpenAPI document using **field**.\n\n*Use this if you don't find specific targets that cater to your usecase.* "
    targets:
      - formats:
          - oas2
          - oas3
        given:
          - "$"
  Operation_Object:
    description: The complete operation object. Use it in combo with field object.
    targets:
      - formats:
          - oas2
          - oas3
        given:
          - "#Path_Item['get']"
          - "#Path_Item['put']"
          - "#Path_Item['post']"
          - "#Path_Item['delete']"
          - "#Path_Item['options']"
          - "#Path_Item['head']"
          - "#Path_Item['patch']"
          - "#Path_Item['trace']"
  Operation_Responses:
    description: Responses for all operations including get, put, post, delete, options, head, patch, trace.
    targets:
      - formats:
          - oas2
          - oas3
        given:
          - "#Operation_Object.responses"
  Path_Item:
    description: ''
    targets:
      - formats:
          - oas2
          - oas3
        given:
          - "$.paths[*]"
  API_Contact:
    description: The top level description in an API document
    targets:
      - formats:
          - oas2
          - oas3
        given:
          - "$.info.contact"
  API_License:
    description: The top level description in an API document
    targets:
      - formats:
          - oas2
          - oas3
        given:
          - "$.info.license"
  All_Markdown:
    description: All markdown descriptions across the document.
    targets:
      - formats:
          - oas2
          - oas3
        given:
          - "$..description"
          - "$..title"
  API_Tags:
    description: Tags on an API object
    targets:
      - formats:
          - oas2
          - oas3
        given:
          - "#Operation_Object.tags"
  Response_All_Object:
    description: All responses (object) in an API
    targets:
      - formats:
          - oas2
        given:
          - "$.responses"
          - "#Operation_Responses"
          - "$..responses"
      - formats:
          - oas3
        given:
          - "$.components.responses"
          - "#Operation_Responses"
          - "$..responses"
  Request_Parameter_All:
    description: All request parameters
    targets:
      - formats:
          - oas2
          - oas3
        given:
          - "$..parameters[*]"
  Path_Object:
    description: Path object. Usually used to target the Path key e.g. `/users/{userId}`
    targets:
      - formats:
          - oas2
          - oas3
        given:
          - "$.paths"
  API_Document_RecursiveSearch:
    description: "The complete API specification document. This can be used to target any part of the OpenAPI document using **field**.\n\n*Use this if you don't find specific targets that cater to your usecase.* "
    targets:
      - formats:
          - oas2
          - oas3
        given:
          - "$..*"
  All_Example:
    description: All examples across the API document
    targets:
      - formats:
          - oas2
        given:
          - "$..examples[*]"
      - formats:
          - oas3
        given:
          - "$.components.examples[*]"
          - "$.paths[*][*]..content[*].examples[*]"
          - "$.paths[*][*]..parameters[*].examples[*]"
          - "$.components.parameters[*].examples[*]"
          - "$.paths[*][*]..headers[*].examples[*]"
          - "$.components.headers[*].examples[*]"
  API_Tags_Item:
    description: Tags on an API object
    targets:
      - formats:
          - oas2
          - oas3
        given:
          - "$.tags[*]"
  All_Array_Item:
    description: ''
    targets:
      - formats:
          - oas2
          - oas3
          - oas3_0
        given:
          - "$..[?(@ && @.type=='array')]"
  Request_Parameter_Path:
    description: "All request path parameters"
    targets:
      - formats:
          - oas2
          - oas3
        given:
          - "$..parameters[?(@ && @.in==\"path\")]"
rules:
  contact-url:
    given:
      - "#API_Contact"
    severity: warn
    then:
      function: truthy
      field: url
    description: |-
      The `contact` object should have a valid organization URL.
    message: Contact object should have "url".
  contact-email:
    given:
      - "#API_Contact"
    severity: warn
    then:
      function: truthy
      field: email
    description: |-
      The `contact` object should have a valid email.
    message: Contact object should have "email"
  info-contact:
    given:
      - "#API_Document"
    severity: warn
    then:
      function: truthy
      field: info.contact
    description: |-
      The `info` object should include a `contact` object.
    message: Info object should have "contact" object.
  info-description:
    given:
      - "#API_Document"
    severity: warn
    then:
      function: truthy
      field: info.description
    description: |-
      The `info` object should have a `description` object.
    message: Info object should have "description" object.
  info-license:
    given:
      - "#API_Document"
    severity: warn
    then:
      function: truthy
      field: info.license
    description: |-
      The `info` object should have a `license` object.
    message: Info object should have "license" object.
  license-url:
    given:
      - "#API_License"
    severity: warn
    then:
      function: truthy
      field: url
    description: |-
      The `license` object should include a valid url.
    message: License object should include "url".
  no-eval-in-markdown:
    given:
      - "#All_Markdown"
    severity: warn
    then:
      function: pattern
      functionOptions:
        notMatch: 'eval\('
    description: |-
      Markdown descriptions should not contain eval() functions, which pose a security risk.
    message: Markdown descriptions must not have "eval(".
  no-script-tags-in-markdown:
    given:
      - "#All_Markdown"
    severity: warn
    then:
      function: pattern
      functionOptions:
        notMatch: '<script'
    description: |-
      Markdown descriptions should not contain script tags, which pose a security risk.
    message: Markdown descriptions must not have "<script>" tags.
  openapi-tags-alphabetical:
    given:
      - "#API_Document"
    severity: warn
    then:
      function: alphabetical
      functionOptions:
        keyedBy: name
      field: tags
    description: |-
      Global tags should be in alphabetical order based on the name property.
    message: OpenAPI object should have alphabetical "tags".
  openapi-tags:
    given:
      - "#API_Document"
    severity: warn
    then:
      function: schema
      functionOptions:
        schema:
          type: array
          minItems: 1
      field: tags
    description: |-
      At least one global tag should be specified at the root OpenAPI Document level.
    message: OpenAPI object should have non-empty "tags" array.
  operation-description:
    given:
      - "#Operation_Object"
    severity: warn
    then:
      function: truthy
      field: description
    description: |-
      Each operation should have a description.
    message: Operation "description" should be present and non-empty string.
  operation-operationId:
    given:
      - "#Operation_Object"
    severity: warn
    then:
      function: truthy
      field: operationId
    description: |-
      All operations should have an operationId.
    message: Operation should have "operationId".
  operation-operationId-valid-in-url:
    given:
      - "#Operation_Object"
    severity: error
    then:
      function: pattern
      functionOptions:
        match: "^[A-Za-z0-9-._~:/?#\\[\\]@!\\$&'()*+,;=]*$"
      field: operationId
    description: |-
      Operation IDs must not contain characters that are invalid for URLs.
    message: OperationId should not have characters that are invalid when used in URL.
  operation-tags:
    given:
      - "#Operation_Object"
    severity: warn
    then:
      - function: length
        functionOptions:
          max: 999
          min: 1
        field: tags
      - function: truthy
        field: tags
    description: |-
      At least one tag should be defined for each operation.
    message: Operation should have non-empty "tags" array.
  path-declarations-must-exist:
    given:
      - "#Path_Object"
    severity: error
    then:
      function: pattern
      functionOptions:
        notMatch: '\{\}'
      field: "@key"
    description: |-
      Path parameter declarations must not be empty, e.g. /users/{} is invalid.
    message: Path parameter declarations must not be empty, e.g., "/given/{}" is invalid.
  paths-no-trailing-slash:
    given:
      - "#Path_Object"
    severity: error
    then:
      function: pattern
      functionOptions:
        notMatch: '.+\/$'
      field: "@key"
    description: |-
      Paths must not end with a trailing slash.
    message: Paths must not end with a trailing slash.
  contact-name:
    given:
      - "#API_Contact"
    severity: warn
    then:
      function: truthy
      field: name
    description: |-
      The contact object should have an organization name.
    message: Contact object should have "name".
  path-not-include-query:
    given:
      - "#Path_Object"
    severity: warn
    then:
      function: pattern
      functionOptions:
        notMatch: '\?'
      field: "@key"
    description: |-
      Paths should not include query string items. Add them as parameters with in: query instead.
    message: Path should not include query string.
  tag-description:
    given:
      - "#API_Tags_Item"
    severity: warn
    then:
      function: truthy
      field: description
    description: |-
      Tags defined at the global level should have a description.
    message: Tag object should have "description".
  parameter-description:
    given:
      - "#Request_Parameter_All"
    severity: warn
    then:
      function: truthy
      field: description
    description: |-
      All parameter objects should have a description.
    message: Parameter objects must have "description".
  oas3-examples-value-or-externalValue:
    given:
      - "#All_Example"
    severity: warn
    then:
      function: xor
      functionOptions:
        properties:
          - externalValue
          - value
    description: |-
      The examples object should include a value or externalValue field, but not both.
    message: Examples must have either "value" or "externalValue" field.
    formats:
      - oas3
  array-items:
    given:
      - "#All_Array_Item"
    severity: error
    then:
      function: truthy
      field: items
    description: |-
      Schemas with type: array require a sibling items field.
    message: 'Schemas with "type: array", require a sibling "items" field'
  path-parameters-on-path-only:
    given:
      - "$.paths[*][*].parameters[?(@.in == 'path')]"
    severity: warn
    then:
      function: falsy
    description: |-
      Path parameters should be defined on the path level instead of the operation level.
    message: Path parameters should be defined on the path level.
  paths-no-query-params:
    given:
      - "$.paths"
    severity: warn
    then:
      function: pattern
      functionOptions:
        notMatch: '\?'
      field: "@key"
    description: |-
      Paths should not have query parameters in them. They should be defined separately in the OpenAPI.
    message: Paths should not have query parameters in them. They should be defined separately in the OpenAPI.
  path-casing:
    given:
      - $.paths
    severity: error
    then:
      function: pattern
      functionOptions:
        match: '^\/([a-z0-9]+(-[a-z0-9]+)*)?(\/[a-z0-9]+(-[a-z0-9]+)*|\/\{.+\})*$'
      field: '@key'
    description: |-
      Paths must be kebab-case, with hyphens separating words.
    message: Paths must be kebab-case
  resource-names-plural:
    given:
      - $.paths
    severity: warn
    then:
      function: pattern
      functionOptions:
        match: '^((\/v\d+)*((\/[\w+-]*s)(\/\{.*\})*)*)$'
      field: '@key'
    description: |-
      Resource names should generally be plural (e.g. /users not /user).
    message: Resource names should generally be plural
  paths-no-http-verbs:
    given:
      - $.paths
    severity: error
    then:
      function: pattern
      functionOptions:
        notMatch: >-
          \b(GET|PUT|POST|DELETE|LIST|CREATE|REMOVE|get|put|post|delete|list|create|remove|Get|Put|Post|Delete|List|Create|Remove)\b
      field: '@key'
    description: >-
      Verbs such as get, delete, and put must not be included in paths because this information is conveyed by the HTTP method.
    message: Paths must not have HTTP verbs in them
  paths-avoid-special-characters:
    given:
      - $.paths
    severity: warn
    then:
      function: pattern
      functionOptions:
        notMatch: '^(.*)([\$&+,;=?@%]+)(.*)$'
        match: ''
      field: '@key'
    description: >-
      Paths should not contain special characters such as $ & + , ; = ? @ %.
    message: Avoid using special characters in paths
