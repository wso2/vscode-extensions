extends: [[spectral:oas, off]]

functions:
  - aiReadinessFieldCoverage
  - aiReadinessOperationIdConsistency
  - aiReadinessOperationIdUnique
  - aiReadinessSchemaTyping
  - aiReadinessErrorSchemaStructure
  - aiReadinessPaginationParams
  - aiReadinessPaginationMeta
  - aiReadinessRateLimitHeader
  - aiReadinessSecurityScheme
  - aiReadinessIdempotency
  - aiReadinessArrayItemsDefined
  - aiReadinessSchemaHasConstraints
  - aiReadinessSchemaNoEmptyObject
  - aiReadinessErrorResponseCoverage

aliases:

  # ── Core document root ───────────────────────────────────────────────────────
  AI_Document:
    description: "Complete API specification document root."
    targets:
      - formats: [oas2, oas3]
        given: ["$"]

  # ── Info object ──────────────────────────────────────────────────────────────
  AI_Info:
    description: "The info object."
    targets:
      - formats: [oas2, oas3]
        given: ["$.info"]

  # ── Server / host definitions ────────────────────────────────────────────────
  # OAS2 uses flat host+basePath+schemes; OAS3 has servers[]
  AI_Server:
    description: "Server entries (OAS3 only)."
    targets:
      - formats: [oas3]
        given: ["$.servers[*]"]

  # ── Operation objects ────────────────────────────────────────────────────────
  AI_Operation:
    description: "All path operations."
    targets:
      - formats: [oas2, oas3]
        given:
          - "$.paths[*][get,post,put,patch,delete,head,options]"

  AI_Mutating_Operation:
    description: "Mutating operations (POST, PUT, PATCH, DELETE)."
    targets:
      - formats: [oas2, oas3]
        given:
          - "$.paths[*][post,put,patch,delete]"

  AI_Post_Patch_Operation:
    description: "POST and PATCH operations."
    targets:
      - formats: [oas2, oas3]
        given:
          - "$.paths[*][post,patch]"

  AI_Get_Operation:
    description: "GET operations."
    targets:
      - formats: [oas2, oas3]
        given:
          - "$.paths[*].get"

  AI_CRUD_Operation:
    description: "GET/POST/PUT/PATCH/DELETE operations (for status-code checks)."
    targets:
      - formats: [oas2, oas3]
        given:
          - "$.paths[*][get,post,put,patch,delete]"

  AI_Callback_Operation:
    description: "Operations nested inside inline callbacks (OAS3 only)."
    targets:
      - formats: [oas3]
        given:
          - "$.paths[*][get,post,put,patch,delete,head,options].callbacks[*][*][get,post,put,patch,delete,head,options]"
          - "$.components.callbacks[*][*][get,post,put,patch,delete,head,options]"

  AI_Webhook_Operation:
    description: "Webhook operations (OAS3.1 only)."
    targets:
      - formats: [oas3]
        given:
          - "$.webhooks[*][get,post,put,patch,delete,head,options]"

  # ── Path items ───────────────────────────────────────────────────────────────
  AI_Path_Item:
    description: "All path item objects."
    targets:
      - formats: [oas2, oas3]
        given: ["$.paths[*]"]

  # ── Parameters ───────────────────────────────────────────────────────────────
  # Covers inline (operation-level + path-level) and reusable component parameters.
  AI_Parameter_All:
    description: "Every parameter object in the document."
    targets:
      - formats: [oas2]
        given:
          - "$.paths[*][*].parameters[*]"
          - "$.paths[*].parameters[*]"
          - "$.parameters[*]"
      - formats: [oas3]
        given:
          - "$.paths[*][*].parameters[*]"
          - "$.paths[*].parameters[*]"
          - "$.components.parameters[*]"

  # Parameters that should carry examples: all non-body types at every level.
  # OAS2 excludes 'body' (body schema carries its own example).
  # OAS3 adds 'cookie'.
  AI_Parameter_For_Example:
    description: "Query, path, header, and cookie parameters at all levels."
    targets:
      - formats: [oas2]
        given:
          - "$.paths[*][*].parameters[?(@.in == 'query' || @.in == 'path' || @.in == 'header')]"
          - "$.paths[*].parameters[?(@.in == 'query' || @.in == 'path' || @.in == 'header')]"
          - "$.parameters[?(@.in == 'query' || @.in == 'path' || @.in == 'header')]"
      - formats: [oas3]
        given:
          - "$.paths[*][*].parameters[?(@.in == 'query' || @.in == 'path' || @.in == 'header' || @.in == 'cookie')]"
          - "$.paths[*].parameters[?(@.in == 'query' || @.in == 'path' || @.in == 'header' || @.in == 'cookie')]"
          - "$.components.parameters[?(@.in == 'query' || @.in == 'path' || @.in == 'header' || @.in == 'cookie')]"

  AI_Parameter_Schema:
    description: "Schema objects inside parameters at all levels."
    targets:
      - formats: [oas2]
        given:
          - "$.paths[*][*].parameters[*].schema"
          - "$.paths[*].parameters[*].schema"
          - "$.parameters[*].schema"
      - formats: [oas3]
        given:
          - "$.paths[*][*].parameters[*].schema"
          - "$.paths[*].parameters[*].schema"
          - "$.components.parameters[*].schema"

  # ── Request bodies ───────────────────────────────────────────────────────────
  # OAS2: body parameters. OAS3: inline requestBody + reusable component requestBodies.
  AI_Request_Body:
    description: "Request body definitions (inline, for mutating operations)."
    targets:
      - formats: [oas2]
        given:
          - "$.paths[*][post,put,patch].parameters[?(@.in == 'body')]"
      - formats: [oas3]
        given:
          - "$.paths[*][post,put,patch].requestBody"

  AI_Request_Body_Content:
    description: "Media-type entries inside inline request bodies."
    targets:
      - formats: [oas2]
        given:
          - "$.paths[*][post,put,patch].parameters[?(@.in == 'body')]"
      - formats: [oas3]
        given:
          - "$.paths[*][post,put,patch].requestBody.content[*]"

  AI_Request_Body_Schema:
    description: "Schema of inline request bodies."
    targets:
      - formats: [oas2]
        given:
          - "$.paths[*][post,put,patch].parameters[?(@.in == 'body')].schema"
      - formats: [oas3]
        given:
          - "$.paths[*][post,put,patch].requestBody.content[*].schema"

  AI_Component_Request_Body:
    description: "Reusable requestBody objects in components (OAS3 only)."
    targets:
      - formats: [oas3]
        given:
          - "$.components.requestBodies[*]"

  AI_Component_Request_Body_Content:
    description: "Media-type entries inside reusable component requestBodies (OAS3 only)."
    targets:
      - formats: [oas3]
        given:
          - "$.components.requestBodies[*].content[*]"

  # ── Responses ────────────────────────────────────────────────────────────────
  AI_Response_All:
    description: "All response objects across all operations."
    targets:
      - formats: [oas2, oas3]
        given:
          - "$.paths[*][*].responses[*]"

  AI_Success_Response:
    description: "2xx response objects."
    targets:
      - formats: [oas2, oas3]
        given:
          - "$.paths[*][*].responses[?(@property >= 200 && @property < 300)]"

  AI_Success_Response_Content:
    description: "Media-type entries inside inline 2xx responses."
    targets:
      - formats: [oas2]
        given:
          - "$.paths[*][*].responses[?(@property >= 200 && @property < 300)]"
      - formats: [oas3]
        given:
          - "$.paths[*][*].responses[?(@property >= 200 && @property < 300)].content[*]"

  AI_Success_Response_Json:
    description: "application/json content inside 2xx responses (OAS3)."
    targets:
      - formats: [oas3]
        given:
          - "$.paths[*][*].responses[?(@property >= 200 && @property < 300)].content['application/json']"

  AI_Error_Response:
    description: "4xx and 5xx response objects."
    targets:
      - formats: [oas2, oas3]
        given:
          - "$.paths[*][*].responses[?(@property >= 400)]"

  AI_Error_Response_Content:
    description: "Media-type entries inside error responses."
    targets:
      - formats: [oas2]
        given:
          - "$.paths[*][*].responses[?(@property >= 400)]"
      - formats: [oas3]
        given:
          - "$.paths[*][*].responses[?(@property >= 400)].content[*]"

  AI_Error_Response_Json:
    description: "application/json content inside error responses (OAS3)."
    targets:
      - formats: [oas3]
        given:
          - "$.paths[*][*].responses[?(@property >= 400)].content['application/json']"

  AI_Error_Response_Schema:
    description: "Schemas inside error response content."
    targets:
      - formats: [oas2]
        given:
          - "$.paths[*][*].responses[?(@property >= 400)].schema"
      - formats: [oas3]
        given:
          - "$.paths[*][*].responses[?(@property >= 400)].content[*].schema"

  AI_Component_Response:
    description: "Reusable response objects in components."
    targets:
      - formats: [oas2]
        given:
          - "$.responses[*]"
      - formats: [oas3]
        given:
          - "$.components.responses[*]"

  AI_Component_Response_Content:
    description: "Media-type entries inside reusable component responses."
    targets:
      - formats: [oas2]
        given:
          - "$.responses[*]"
      - formats: [oas3]
        given:
          - "$.components.responses[*].content[*]"

  AI_Response_Header:
    description: "Header objects on operation responses."
    targets:
      - formats: [oas2, oas3]
        given:
          - "$.paths[*][*].responses[*].headers[*]"

  AI_429_Response:
    description: "429 response objects."
    targets:
      - formats: [oas2, oas3]
        given:
          - "$.paths[*][*].responses['429']"

  AI_Response_Schema_All:
    description: "Schemas inside all response content entries."
    targets:
      - formats: [oas2]
        given:
          - "$.paths[*][*].responses[*].schema"
      - formats: [oas3]
        given:
          - "$.paths[*][*].responses[*].content[*].schema"

  AI_List_Response_Schema:
    description: "Schemas inside 2xx GET response content entries (for pagination)."
    targets:
      - formats: [oas2]
        given:
          - "$.paths[*].get.responses[?(@property >= 200 && @property < 300)].schema"
      - formats: [oas3]
        given:
          - "$.paths[*].get.responses[?(@property >= 200 && @property < 300)].content[*].schema"

  # ── Schemas / definitions ────────────────────────────────────────────────────
  AI_Schema_Components:
    description: "Top-level reusable schemas."
    targets:
      - formats: [oas2]
        given: ["$.definitions[*]"]
      - formats: [oas3]
        given: ["$.components.schemas[*]"]

  AI_Schema_Property:
    description: "Properties of reusable schemas."
    targets:
      - formats: [oas2]
        given: ["$.definitions[*].properties[*]"]
      - formats: [oas3]
        given: ["$.components.schemas[*].properties[*]"]

  AI_Schema_Enum_Property:
    description: "Properties that have an enum keyword."
    targets:
      - formats: [oas2]
        given: ["$.definitions[*].properties[?(@.enum)]"]
      - formats: [oas3]
        given: ["$.components.schemas[*].properties[?(@.enum)]"]

  AI_Schema_With_Composition:
    description: "Schemas using oneOf or anyOf (for discriminator checks)."
    targets:
      - formats: [oas2]
        given: ["$.definitions[?(@.oneOf || @.anyOf)]"]
      - formats: [oas3]
        given: ["$.components.schemas[?(@.oneOf || @.anyOf)]"]

  # ── Component headers ────────────────────────────────────────────────────────
  AI_Component_Header:
    description: "Reusable header objects."
    targets:
      - formats: [oas2]
        given: ["$.headers[*]"]
      - formats: [oas3]
        given: ["$.components.headers[*]"]

  # ── Security schemes ─────────────────────────────────────────────────────────
  AI_Security_Scheme:
    description: "Security scheme definitions."
    targets:
      - formats: [oas2]
        given: ["$.securityDefinitions[*]"]
      - formats: [oas3]
        given: ["$.components.securitySchemes[*]"]

  AI_Security_Components:
    description: "The security schemes container."
    targets:
      - formats: [oas2]
        given: ["$"]
      - formats: [oas3]
        given: ["$.components"]

  # ── Tags ─────────────────────────────────────────────────────────────────────
  AI_Tag_Item:
    description: "Individual tag objects in the global tags array."
    targets:
      - formats: [oas2, oas3]
        given: ["$.tags[*]"]

rules:

  # ============================================================================
  # API-Level Documentation
  # ============================================================================

  ai-readiness-api-description:
    description: API must have a comprehensive description for AI understanding
    message: "API description must be present and at least 50 characters for AI readiness"
    given: "#AI_Info"
    then:
      function: aiReadinessFieldCoverage
      functionOptions:
        field: description
        category: descriptions
        minLength: 50

  ai-readiness-server-description:
    description: Server entries should have meaningful descriptions
    message: "Server description must be present and at least 15 characters (e.g., 'Production, customer-facing, EU only')"
    given: "#AI_Server"
    then:
      field: description
      function: length
      functionOptions:
        min: 15

  # ============================================================================
  # Operation-Level Documentation
  # ============================================================================

  ai-readiness-operation-summary:
    description: All operations must have a summary for AI understanding
    message: "Operation '{{property}}' must have a summary for AI readiness"
    given: "#AI_Operation"
    then:
      function: aiReadinessFieldCoverage
      functionOptions:
        field: summary
        category: summaries

  ai-readiness-callback-operation-summary:
    description: Callback operations should have summaries for AI understanding
    message: "Callback operation '{{property}}' should have a summary for AI readiness"
    given: "#AI_Callback_Operation"
    then:
      function: aiReadinessFieldCoverage
      functionOptions:
        field: summary
        category: summaries

  ai-readiness-webhook-operation-summary:
    description: Webhook operations should have summaries for AI understanding
    message: "Webhook operation '{{property}}' should have a summary for AI readiness"
    given: "#AI_Webhook_Operation"
    then:
      function: aiReadinessFieldCoverage
      functionOptions:
        field: summary
        category: summaries

  ai-readiness-path-item-summary:
    description: Path items should have summaries to provide route-level context
    message: "Path item should include a summary for better AI route understanding"
    given: "#AI_Path_Item"
    then:
      field: summary
      function: truthy

  ai-readiness-path-item-description:
    description: Path items should have meaningful descriptions
    message: "Path item description must be present and at least 20 characters for better AI route understanding"
    given: "#AI_Path_Item"
    then:
      field: description
      function: length
      functionOptions:
        min: 20

  ai-readiness-operation-description:
    description: All operations must have a detailed description
    message: "Operation '{{property}}' description must be present and at least 30 characters for AI readiness"
    given: "#AI_Operation"
    then:
      function: aiReadinessFieldCoverage
      functionOptions:
        field: description
        category: descriptions
        minLength: 30

  ai-readiness-callback-operation-description:
    description: Callback operations should have descriptions for AI understanding
    message: "Callback operation '{{property}}' description must be present and at least 20 characters for AI readiness"
    given: "#AI_Callback_Operation"
    then:
      function: aiReadinessFieldCoverage
      functionOptions:
        field: description
        category: descriptions
        minLength: 20

  ai-readiness-webhook-operation-description:
    description: Webhook operations should have descriptions for AI understanding
    message: "Webhook operation '{{property}}' description must be present and at least 20 characters for AI readiness"
    given: "#AI_Webhook_Operation"
    then:
      function: aiReadinessFieldCoverage
      functionOptions:
        field: description
        category: descriptions
        minLength: 20

  ai-readiness-operation-id:
    description: All operations must have an operationId for AI reference
    message: "Operation must have an operationId for AI readiness"
    given: "#AI_Operation"
    then:
      field: operationId
      function: truthy

  ai-readiness-operation-id-casing:
    description: operationIds should use a consistent naming style across the API
    message: "operationId style should be consistent across operations for reliable AI references"
    given: "#AI_Document"
    then:
      function: aiReadinessOperationIdConsistency
      functionOptions:
        allowedStyles: [camel, snake, kebab, pascal]

  ai-readiness-operation-id-unique:
    description: operationIds must be unique across all operations
    message: "operationId values must be unique across the API for reliable AI references"
    given: "#AI_Document"
    then:
      function: aiReadinessOperationIdUnique
      functionOptions:
        category: operationIds

  ai-readiness-operation-tags:
    description: All operations should have tags for AI categorization
    message: "Operation should have at least one tag for AI categorization"
    given: "#AI_Operation"
    then:
      field: tags
      function: truthy

  # ============================================================================
  # Parameters Documentation
  # ============================================================================

  # Single rule: covers both existence (length 0 fails min:15) and meaningful length.
  ai-readiness-parameter-description:
    description: All parameters must have meaningful descriptions
    message: "Parameter '{{value.name}}' description must be present and at least 15 characters for AI readiness"
    given: "#AI_Parameter_All"
    then:
      field: description
      function: length
      functionOptions:
        min: 15

  # Single rule: covers all parameter types (query, path, header, cookie) at all levels
  # including reusable component parameters. OAS2 excludes body/formData.
  ai-readiness-parameter-example:
    description: Parameters should have examples for AI understanding
    message: "Parameter '{{value.name}}' should have an example for AI understanding"
    given: "#AI_Parameter_For_Example"
    then:
      function: aiReadinessFieldCoverage
      functionOptions:
        fields: [example, examples, externalValue]
        category: examples

  # ============================================================================
  # Request Body Documentation
  # ============================================================================

  # Single rule: existence implied by minLength — no separate truthy check needed.
  ai-readiness-request-body-description:
    description: Request bodies must have meaningful descriptions
    message: "Request body description must be present and at least 20 characters for AI readiness"
    given: "#AI_Request_Body"
    then:
      function: aiReadinessFieldCoverage
      functionOptions:
        field: description
        category: descriptions
        minLength: 20

  ai-readiness-request-body-example:
    description: Request bodies should have examples
    message: "Request body for '{{property}}' should have an example for AI understanding"
    given: "#AI_Request_Body_Content"
    then:
      function: aiReadinessFieldCoverage
      functionOptions:
        fields: [example, examples, externalValue]
        category: examples

  # Reusable component requestBodies — description and example.
  ai-readiness-component-request-body-description:
    description: Reusable request bodies in components must have descriptions
    message: "Component requestBody '{{property}}' description must be present and at least 20 characters for AI readiness"
    given: "#AI_Component_Request_Body"
    then:
      function: aiReadinessFieldCoverage
      functionOptions:
        field: description
        category: descriptions
        minLength: 20

  ai-readiness-component-request-body-example:
    description: Reusable request bodies in components should have examples
    message: "Component requestBody '{{property}}' content should have an example for AI understanding"
    given: "#AI_Component_Request_Body_Content"
    then:
      function: aiReadinessFieldCoverage
      functionOptions:
        fields: [example, examples, externalValue]
        category: examples

  ai-readiness-request-body-schema-typed:
    description: Request body schemas must have explicit types
    message: "Request body schema should have an explicit type so AI agents construct valid payloads"
    given: "#AI_Request_Body_Schema"
    then:
      function: aiReadinessSchemaTyping
      functionOptions:
        category: typing

  ai-readiness-request-body-schema-required:
    description: Request body schemas should define a required array
    message: "Request body schema should declare a 'required' array to clarify mandatory fields for AI agents"
    given: "#AI_Request_Body_Schema"
    then:
      field: required
      function: truthy

  # ============================================================================
  # Response Documentation
  # ============================================================================

  # Single rule covering both existence and meaningful length for ALL responses
  # (replaces the former separate error-response-description-length rule).
  ai-readiness-response-description:
    description: All responses must have meaningful descriptions
    message: "Response '{{property}}' description must be present and at least 20 characters for AI readiness"
    given: "#AI_Response_All"
    then:
      function: aiReadinessFieldCoverage
      functionOptions:
        field: description
        category: descriptions
        minLength: 20

  ai-readiness-response-example:
    description: Success responses should have examples
    message: "Response should have an example for AI understanding"
    given: "#AI_Success_Response_Content"
    then:
      function: aiReadinessFieldCoverage
      functionOptions:
        fields: [example, examples, externalValue]
        category: examples

  ai-readiness-response-header-example:
    description: Response headers should have examples
    message: "Response header '{{property}}' should include an example for AI understanding"
    given: "#AI_Response_Header"
    then:
      function: aiReadinessFieldCoverage
      functionOptions:
        fields: [example, examples]
        category: examples

  # Reusable component responses — description and example.
  ai-readiness-component-response-description:
    description: Reusable responses in components must have meaningful descriptions
    message: "Component response '{{property}}' description must be present and at least 20 characters for AI readiness"
    given: "#AI_Component_Response"
    then:
      function: aiReadinessFieldCoverage
      functionOptions:
        field: description
        category: descriptions
        minLength: 20

  ai-readiness-component-response-example:
    description: Reusable responses in components should have examples
    message: "Component response '{{property}}' content should have an example for AI understanding"
    given: "#AI_Component_Response_Content"
    then:
      function: aiReadinessFieldCoverage
      functionOptions:
        fields: [example, examples, externalValue]
        category: examples

  ai-readiness-response-schema-typed:
    description: Response schemas must have explicit types
    message: "Response schema should have an explicit type so AI agents can parse response payloads"
    given: "#AI_Response_Schema_All"
    then:
      function: aiReadinessSchemaTyping
      functionOptions:
        category: typing

  ai-readiness-success-response-content:
    description: All success responses must define structured payload content
    message: "2xx response '{{property}}' must define response content so AI agents can reliably parse success payloads"
    given: "#AI_Success_Response"
    then:
      field: content
      function: truthy

  ai-readiness-success-response-json-schema:
    description: JSON success responses must define a schema
    message: "2xx response '{{property}}' application/json content must define a schema for consistent AI consumption"
    given: "#AI_Success_Response_Json"
    then:
      field: schema
      function: truthy

  ai-readiness-error-response-content:
    description: All error responses must define structured payload content
    message: "Error response '{{property}}' must define response content so AI agents can parse failures consistently"
    given: "#AI_Error_Response"
    then:
      field: content
      function: truthy

  ai-readiness-error-response-json-schema:
    description: JSON error responses must define a schema
    message: "Error response '{{property}}' application/json content must define a schema for consistent AI error handling"
    given: "#AI_Error_Response_Json"
    then:
      field: schema
      function: truthy

  # ============================================================================
  # Status Codes
  # ============================================================================

  ai-readiness-success-response:
    description: Operations must have success responses
    message: "Operation must define at least one success response (2xx) for AI understanding"
    given: "#AI_CRUD_Operation"
    then:
      field: responses
      function: schema
      functionOptions:
        schema:
          type: object
          properties:
            "200": {}
            "201": {}
            "202": {}
            "204": {}
          anyOf:
            - required: ["200"]
            - required: ["201"]
            - required: ["202"]
            - required: ["204"]

  ai-readiness-error-responses-4xx:
    description: Operations must define 4xx error responses
    message: "Operation must define at least one 4xx error response for AI error handling"
    given: "#AI_CRUD_Operation"
    then:
      function: aiReadinessErrorResponseCoverage
      functionOptions:
        category: errorResponses
        requiredCodes: ["400", "401", "403", "404", "422", "429"]

  ai-readiness-error-responses-5xx:
    description: Operations should define 5xx error responses
    message: "Operation should define at least one 5xx error response for AI error handling"
    given: "#AI_CRUD_Operation"
    then:
      field: responses
      function: schema
      functionOptions:
        schema:
          type: object
          properties:
            "500": {}
            "502": {}
            "503": {}
            "504": {}
          anyOf:
            - required: ["500"]
            - required: ["502"]
            - required: ["503"]
            - required: ["504"]

  ai-readiness-error-response-schema:
    description: Error responses should have proper schemas
    message: "Error response should have a schema definition for AI error handling"
    given: "#AI_Error_Response_Content"
    then:
      field: schema
      function: truthy

  # ============================================================================
  # Schema Documentation
  # ============================================================================

  # Single rule: length min:20 implies existence — no separate truthy check needed.
  ai-readiness-schema-description:
    description: Component schemas must have meaningful descriptions
    message: "Schema '{{property}}' description must be present and at least 20 characters for AI readiness"
    given: "#AI_Schema_Components"
    then:
      field: description
      function: length
      functionOptions:
        min: 20

  ai-readiness-schema-title:
    description: Component schemas should have titles for AI discoverability
    message: "Schema '{{property}}' should have a title to help AI agents identify its semantic meaning"
    given: "#AI_Schema_Components"
    then:
      field: title
      function: truthy

  ai-readiness-schema-example:
    description: Component schemas should have examples
    message: "Schema '{{property}}' should have an example for AI understanding"
    given: "#AI_Schema_Components"
    then:
      function: aiReadinessFieldCoverage
      functionOptions:
        fields: [example, examples]
        category: examples

  # Single rule: existence implied by minLength.
  ai-readiness-schema-property-description:
    description: Schema properties must have meaningful descriptions
    message: "Property '{{property}}' description must be present and at least 10 characters for AI readiness"
    given: "#AI_Schema_Property"
    then:
      function: aiReadinessFieldCoverage
      functionOptions:
        field: description
        category: descriptions
        minLength: 10

  ai-readiness-component-header-description:
    description: Reusable component headers must have descriptions
    message: "Header '{{property}}' description must be present and at least 10 characters for AI readiness"
    given: "#AI_Component_Header"
    then:
      field: description
      function: length
      functionOptions:
        min: 10

  ai-readiness-component-header-example:
    description: Component headers should have examples
    message: "Header '{{property}}' should include an example for AI understanding"
    given: "#AI_Component_Header"
    then:
      function: aiReadinessFieldCoverage
      functionOptions:
        fields: [example, examples]
        category: examples

  ai-readiness-schema-enum-description:
    description: Enum properties should have descriptions explaining possible values
    message: "Enum property '{{property}}' should have a description explaining possible values"
    given: "#AI_Schema_Enum_Property"
    then:
      field: description
      function: truthy

  # ============================================================================
  # Strict Typing & Schema Constraints
  # ============================================================================

  ai-readiness-schema-property-type:
    description: All schema properties must have an explicit type
    message: "Schema property '{{property}}' must have an explicit type defined to prevent ambiguous AI interpretation"
    given: "#AI_Schema_Property"
    then:
      function: aiReadinessSchemaTyping
      functionOptions:
        category: typing

  ai-readiness-parameter-schema-type:
    description: All parameter schemas must have explicit types
    message: "Parameter schema at '{{property}}' must have an explicit type"
    given: "#AI_Parameter_Schema"
    then:
      function: aiReadinessSchemaTyping
      functionOptions:
        category: typing

  ai-readiness-schema-string-format:
    description: String properties with semantic meaning should use format modifiers
    message: "String property '{{property}}' should use a format modifier (e.g., date-time, email, uuid) for unambiguous AI interpretation"
    given: "#AI_Schema_Property"
    then:
      function: schema
      functionOptions:
        schema:
          if:
            properties:
              type:
                const: string
            required: [type]
          then:
            required: [format]

  ai-readiness-schema-no-empty-object:
    description: Object schemas must define their structure — empty type:object is ambiguous
    message: "Schema '{{property}}' is typed as 'object' but declares no properties — define properties, additionalProperties, or a composition keyword"
    given: "#AI_Schema_Components"
    then:
      function: aiReadinessSchemaNoEmptyObject
      functionOptions:
        category: typing

  ai-readiness-schema-property-no-empty-object:
    description: Object-typed properties must define their structure
    message: "Property '{{property}}' is typed as 'object' but declares no properties — empty object types prevent AI agents from constructing valid payloads"
    given: "#AI_Schema_Property"
    then:
      function: aiReadinessSchemaNoEmptyObject
      functionOptions:
        category: typing

  ai-readiness-array-items-defined:
    description: Array schemas must define their item type
    message: "Array schema '{{property}}' must define an 'items' schema so AI agents understand the element type"
    given: "#AI_Schema_Components"
    then:
      function: aiReadinessArrayItemsDefined
      functionOptions:
        category: typing

  ai-readiness-array-property-items-defined:
    description: Array-type properties must define their item schema
    message: "Array property '{{property}}' must define an 'items' schema — untyped arrays are ambiguous for AI agents"
    given: "#AI_Schema_Property"
    then:
      function: aiReadinessArrayItemsDefined
      functionOptions:
        category: typing

  ai-readiness-schema-validation-constraints:
    description: Scalar schema properties should define validation constraints
    message: "Schema property '{{property}}' should define constraints (pattern/minLength/maxLength/minimum/maximum) to guide deterministic AI payload generation"
    given: "#AI_Schema_Property"
    then:
      function: aiReadinessSchemaHasConstraints
      functionOptions:
        category: typing

  # ============================================================================
  # Rich Error Semantics (RFC 7807)
  # ============================================================================

  ai-readiness-error-schema-rfc7807:
    description: Error responses should follow RFC 7807 problem detail structure
    message: "Error schema should include 'type', 'title', and 'detail' fields per RFC 7807 for rich AI error semantics"
    given: "#AI_Error_Response_Schema"
    then:
      function: aiReadinessErrorSchemaStructure
      functionOptions:
        category: errorSemantics
        requiredFields: [type, title, detail]

  # ============================================================================
  # Operational Header Signals
  # ============================================================================

  ai-readiness-429-rate-limit-headers:
    description: Rate-limited responses must include retry guidance headers
    message: "429 response must declare Retry-After or X-RateLimit-* headers so AI agents can back off and retry safely"
    given: "#AI_429_Response"
    then:
      function: aiReadinessRateLimitHeader
      functionOptions:
        category: headers

