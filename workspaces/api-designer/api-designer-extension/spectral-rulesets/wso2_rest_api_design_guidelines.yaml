name: Sample guidelines for REST API design
description: >-
  A set of guidelines focused on enforcing uniformity in API style, including
  naming conventions, formatting, and documentation to ensure clarity and
  maintainability across all APIs.
ruleCategory: SPECTRAL
ruleType: API_DEFINITION
artifactType: REST_API
documentationLink: "https://apim.docs.wso2.com/en/4.5.0/reference/governance/wso2-rest-api-design-guidelines/"
provider: WSO2
rulesetContent:
  aliases:
    API_Document:
      description: "The complete API specification document. This can be used to target
          any part of the OpenAPI document using **field**.\n\n*Use this if you don't
          find specific targets that cater to your usecase.* "
      targets:
        - formats:
            - oas2
            - oas3
          given:
            - "$"
    Operation_Object:
      description: The complete operation object. Use it in combo with field object.
      targets:
        - formats:
            - oas2
            - oas3
          given:
            - "#Path_Item['get']"
            - "#Path_Item['put']"
            - "#Path_Item['post']"
            - "#Path_Item['delete']"
            - "#Path_Item['options']"
            - "#Path_Item['head']"
            - "#Path_Item['patch']"
            - "#Path_Item['trace']"
    Operation_Responses:
      description: Responses for all operations including get, put, post, delete, options,
        head, patch, trace.
      targets:
        - formats:
            - oas2
            - oas3
          given:
            - "#Operation_Object.responses"
    Path_Item:
      description: ''
      targets:
        - formats:
            - oas2
            - oas3
          given:
            - "$.paths[*]"
    API_Contact:
      description: The top level description in an API document
      targets:
        - formats:
            - oas2
            - oas3
          given:
            - "$.info.contact"
    API_License:
      description: The top level description in an API document
      targets:
        - formats:
            - oas2
            - oas3
          given:
            - "$.info.license"
    All_Markdown:
      description: All markdown descriptions across the document.
      targets:
        - formats:
            - oas2
            - oas3
          given:
            - "$..description"
            - "$..title"
    API_Tags:
      description: Tags on an API object
      targets:
        - formats:
            - oas2
            - oas3
          given:
            - "#Operation_Object.tags"
    Response_All_Object:
      description: All responses (object) in an API
      targets:
        - formats:
            - oas2
          given:
            - "$.responses"
            - "#Operation_Responses"
            - "$..responses"
        - formats:
            - oas3
          given:
            - "$.components.responses"
            - "#Operation_Responses"
            - "$..responses"
    Request_Parameter_All:
      description: All request parameters
      targets:
        - formats:
            - oas2
            - oas3
          given:
            - "$..parameters[*]"
    Path_Object:
      description: Path object. Usually used to target the Path key e.g. `/users/{userId}`
      targets:
        - formats:
            - oas2
            - oas3
          given:
            - "$.paths"
    API_Document_RecursiveSearch:
      description: "The complete API specification document. This can be used to target
          any part of the OpenAPI document using **field**.\n\n*Use this if you don't
          find specific targets that cater to your usecase.* "
      targets:
        - formats:
            - oas2
            - oas3
          given:
            - "$..*"
    All_Example:
      description: All examples across the API document
      targets:
        - formats:
            - oas2
          given:
            - "$..examples[*]"
        - formats:
            - oas3
          given:
            - "$.components.examples[*]"
            - "$.paths[*][*]..content[*].examples[*]"
            - "$.paths[*][*]..parameters[*].examples[*]"
            - "$.components.parameters[*].examples[*]"
            - "$.paths[*][*]..headers[*].examples[*]"
            - "$.components.headers[*].examples[*]"
    API_Tags_Item:
      description: Tags on an API object
      targets:
        - formats:
            - oas2
            - oas3
          given:
            - "$.tags[*]"
    All_Array_Item:
      description: ''
      targets:
        - formats:
            - oas2
            - oas3
            - oas3_0
          given:
            - "$..[?(@ && @.type=='array')]"

    Request_Parameter_Path:
      description: "All request path parameters"
      targets:
        - formats:
            - oas2
            - oas3
          given:
            - "$..parameters[?(@ && @.in==\"path\")]"

  rules:
    contact-url:
      given:
        - "#API_Contact"
      severity: warn
      then:
        function: truthy
        field: url
      description: |-
        The `contact` object should have a valid organization URL.

        **Valid Example**

        ```json
        {
          "contact": {
             ... ,
             "url": "https://acme.com",
             ...
          },
        ```
      message: Contact object should have "url".
      fixSuggestion: >-
        In `info.contact`, add a `url` string pointing to your product or support website so consumers know where to get help.

    contact-email:
      given:
        - "#API_Contact"
      severity: warn
      then:
        function: truthy
        field: email
      description: |-
        The `contact` object should have a valid email.

        **Valid Example**

        ```json
        {
          "contact": {
             ... ,
             "email": "support.contact@acme.com"
          },
        ```
      message: Contact object should have "email"
      fixSuggestion: >-
        Set `info.contact.email` to a monitored address (e.g. api-support@company.com) for security and integration questions.

    info-contact:
      given:
        - "#API_Document"
      severity: warn
      then:
        function: truthy
        field: info.contact
      description: |-
        The `info` object should include a `contact` object.

        **Valid Example**

        ```json
        {
          "info": {
            ... ,
            "contact": {
              "name": "ACME Corporation",
              "url": "https://acme.com",
              "email": "support.contact@acme.com"
            }
          }
        }
        ```
      message: Info object should have "contact" object.
      fixSuggestion: >-
        Add an `info.contact` object with at least `name` and a reachable `email` or `url` so the API is attributable and supportable.

    info-description:
      given:
        - "#API_Document"
      severity: warn
      then:
        function: truthy
        field: info.description
      description: |-
        The `info` object should have a `description` object.

        **Valid Example**

        ```json
        {
          "info": {
             ... ,
             "description": "This describes my API."
          }
        }
        ```
      message: Info object should have "description" object.
      fixSuggestion: >-
        Write a clear `info.description` summarizing the API’s purpose, scope, and any auth or base-URL expectations.

    info-license:
      given:
        - "#API_Document"
      severity: warn
      then:
        function: truthy
        field: info.license
      description: |-
        The `info` object should have a `license` object.

        **Valid Example**

        ```json
        {
          "info": {
            ... ,
            "license": {
              "name": "Attribution-ShareAlike 4.0 International (CC BY-SA 4.0)",
              "url": "https://creativecommons.org/licenses/by-sa/4.0/"
            }
          }
        }
        ```
      message: Info object should have "license" object.
      fixSuggestion: >-
        Add `info.license` with your SPDX or license name, and include `url` to the full license text when possible.

    license-url:
      given:
        - "#API_License"
      severity: warn
      then:
        function: truthy
        field: url
      description: |-
        The `license` object should include a valid url.

        **Valid Example**

        ```json
        {
          "license": {
            "name": "Attribution-ShareAlike 4.0 International (CC BY-SA 4.0)",
            "url": "https://creativecommons.org/licenses/by-sa/4.0/"
          }
        }
        ```
      message: License object should include "url".
      fixSuggestion: >-
        Set `info.license.url` to the canonical license page (e.g. Creative Commons or Apache) matching `license.name`.

    no-eval-in-markdown:
      given:
        - "#All_Markdown"
      severity: warn
      then:
        function: pattern
        functionOptions:
          notMatch: 'eval\('
      description: |-
        Markdown descriptions should not contain [`eval()` functions](https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Global_Objects/eval),
        which pose a security risk.

        **Invalid Example**

        ```json
        {
          "info": {
            ... ,
            "description": "API for users. eval()"
          }
        }
        ```
      message: Markdown descriptions must not have "eval(".
      fixSuggestion: >-
        Remove any `eval(` usage from descriptions; document behavior in static text, diagrams, or links instead.

    no-script-tags-in-markdown:
      given:
        - "#All_Markdown"
      severity: warn
      then:
        function: pattern
        functionOptions:
          notMatch: '<script'
      description: |-
        Markdown descriptions should not contain `script` tags, which pose a security risk.

        **Invalid Example**

        ```json
        {
          "info": {
            ... ,
            "description": "API for users. <script>alert(\"You are Hacked\");</script>"
          }
        }
        ```
      message: Markdown descriptions must not have "<script>" tags.
      fixSuggestion: >-
        Delete `<script>` tags and unsafe HTML from markdown; use code fences, links, or static examples only.

    openapi-tags-alphabetical:
      given:
        - "#API_Document"
      severity: warn
      then:
        function: alphabetical
        functionOptions:
          keyedBy: name
        field: tags
      description: |-
        Global tags specified at the root OpenAPI Document level should be in alphabetical order based on the `name` property.

        **Invalid Example**

        ```json
        {
          "tags":[
            {
              "name":"Z Global Tag"
            },
            {
              "name":"A Global Tag"
            }
          ]
        }
        ```

        **Valid Example**

        ```json
        {
          "tags":[
            {
              "name":"A Global Tag"
            },
            {
              "name":"Z Global Tag"
            }
          ]
        }
        ```
      message: OpenAPI object should have alphabetical "tags".
      fixSuggestion: >-
        Sort the global `tags` array by `name` (case-sensitive or locale as your style guide requires) for predictable navigation in docs and tools.

    openapi-tags:
      given:
        - "#API_Document"
      severity: warn
      then:
        function: schema
        functionOptions:
          schema:
            type: array
            minItems: 1
        field: tags
      description: |-
        At least one global tag should be specified at the root OpenAPI Document level.

        **Valid Example**

        ```json
        {
          "tags":[
            {
              "name":"Global Tag #1"
            },
            {
              "name":"Global Tag #2"
            }
          ]
        }
        ```
      message: OpenAPI object should have non-empty "tags" array.
      fixSuggestion: >-
        Add at least one top-level `tags` entry in `info` with `name` (and ideally `description`) to group operations in documentation.

    operation-description:
      given:
        - "#Operation_Object"
      severity: warn
      then:
        function: truthy
        field: description
      description: |-
        Each operation should have a description.

        **Valid Example**

        ```json
        {
          "get": {
            "description": "Get a list of users."
          }
        }
        ```
      message: Operation "description" should be present and non-empty string.
      fixSuggestion: >-
        Add a non-empty `description` to each operation summarizing behavior, side effects, idempotency, and error cases.

    operation-operationId:
      given:
        - "#Operation_Object"
      severity: warn
      then:
        function: truthy
        field: operationId
      description: |-
        All operations should have an `operationId`.

        **Valid Example**

        ```json
        {
          "get": {
            "summary": "Get users",
            "operationId": "get-users"
          }
        }
        ```
      message: Operation should have "operationId".
      fixSuggestion: >-
        Assign a unique, stable `operationId` per operation (e.g. `getUserById`) for codegen and client method names.

    operation-operationId-valid-in-url:
      given:
        - "#Operation_Object"
      severity: error
      then:
        function: pattern
        functionOptions:
          match: "^[A-Za-z0-9-._~:/?#\\[\\]@!\\$&'()*+,;=]*$"
        field: operationId
      description: |-
        Operation IDs must not contain characters that are invalid for URLs.

        **Invalid Example**

        The `operationId` in this example includes a pipe and space, which are invalid for URLs.

        ```json
        {
          "/users": {
            "get": {
              "operationId": "invalid|operationID"
            }
          }
        }
        ```

        **Valid Example**

        This `operationId` is valid for URLs.

        ```json
        {
          "/users": {
            "get": {
              "operationId": "this-must-be-unique"
            }
          }
        }
        ```
      message: OperationId should not have characters that are invalid when used in URL.
      fixSuggestion: >-
        Restrict `operationId` to URL-safe characters: letters, digits, hyphen, underscore, and unreserved URL symbols per your style guide; remove spaces and `|`.

    operation-tags:
      given:
        - "#Operation_Object"
      severity: warn
      then:
        - function: length
          functionOptions:
            max: 999
            min: 1
          field: tags
        - function: truthy
          field: tags
      description: |-
        At least one tag should be defined for each operation.

        **Valid Example**

        ```json
        {
          "get": {
            "tags": ["Users"]
          }
        }
        ```
      message: Operation should have non-empty "tags" array.
      fixSuggestion: >-
        Add a `tags` array to each operation referencing global tag names (e.g. `["Users"]`) so UIs and SDKs can group endpoints.

    path-declarations-must-exist:
      given:
        - "#Path_Object"
      severity: error
      then:
        function: pattern
        functionOptions:
          notMatch: '\{\}'
        field: "@key"
      description: |-
        Path parameter declarations must not be empty.

        **Invalid Example**

        `/users/{}`

        **Valid Example**

        `/users/{userId}`
      message: Path parameter declarations must not be empty, e.g., "/given/{}" is invalid.
      fixSuggestion: >-
        Name every path parameter (e.g. `/users/{userId}`) and ensure a matching `parameters` entry with `in: path` and `required: true`.


    paths-no-trailing-slash:
      given:
        - "#Path_Object"
      severity: error
      then:
        function: pattern
        functionOptions:
          notMatch: '.+\/$'
        field: "@key"
      description: |-
        Paths must not end with a trailing slash.

        `/users` and `/users/` are separate paths. It's considered bad practice for them to differ based only on a trailing slash. It's usually preferred to not have a trailing slash.

        **Invalid Example**

        The `users` path ends with a slash.

        ```json
        {
          "/users/": {
            "post": {}
          }
        }
        ```

        **Valid Example**

        ```json
        {
          "/user": {
            "post": {}
          }
        }
        ```
      message: Paths must not end with a trailing slash.
      fixSuggestion: >-
        Remove the trailing `/` from `paths` keys (e.g. use `/users` instead of `/users/`) so only one canonical path exists.

    contact-name:
      given:
        - "#API_Contact"
      severity: warn
      then:
        function: truthy
        field: name
      description: |-
        The `contact` object should have an organization name.

        **Valid Example**

        ```json
        {
          "contact": {
            "name": "ACME Corporation"
          }
        }
        ```
      message: Contact object should have "name".
      fixSuggestion: >-
        Set `info.contact.name` to your organization or API team name as shown to API consumers.

    path-not-include-query:
      given:
        - "#Path_Object"
      severity: warn
      then:
        function: pattern
        functionOptions:
          notMatch: '\?'
        field: "@key"
      description: |-
        Paths should not include `query` string items. Instead, add them as parameters with `in: query`.

        **Invalid Example**

        ```json
        {
          "/users/{?id}": {
          }
        }
        ```

        **Valid Example**

        ```json
        {
          "parameters": [
            {
              "schema": {
                "type": "string"
              },
              "name": "id",
              "in": "path",
              "required": true,
              "description": "User's ID"
            }
          ]
        }
        ```
      message: Path should not include query string.
      fixSuggestion: >-
        Move query parameters out of the path string; use a clean path (e.g. `/users`) and define filters with `in: query` parameters.

    tag-description:
      given:
        - "#API_Tags_Item"
      severity: warn
      then:
        function: truthy
        field: description
      description: |-
        Tags defined at the global level should have a description.

        **Valid Example**

        ```json
        {
          "tags": [
            {
              "name": "Users",
              "description": "End-user information"
            }
          ]
        }
        ```
      message: Tag object should have "description".
      fixSuggestion: >-
        For each entry in the root `tags` array, add a `description` explaining what endpoints belong in that group.

    parameter-description:
      given:
        - "#Request_Parameter_All"
      severity: warn
      then:
        function: truthy
        field: description
      description: |
        All `parameter` objects should have a description.

        **Valid Example**

        ```json
        {
          "parameters": [
            {
              "schema": {
                "type": "integer"
              },
              ... ,
              ... ,
              "description": "The number of days to include in the response."
            }
          ]
        }
        ```
      message: Parameter objects must have "description".
      fixSuggestion: >-
        Add a non-empty `description` to every parameter (path, query, header) describing format, units, and defaults.

    oas3-examples-value-or-externalValue:
      given:
        - "#All_Example"
      severity: warn
      then:
        function: xor
        functionOptions:
          properties:
            - externalValue
            - value
      description: |
        The `examples` object should include a `value` or `externalValue` field, but cannot include both.

        **Invalid Example**

        This example includes both a `value` field and an `externalValue` field.

        ```json
        {
          "examples": {
            "example-1": {
              "value": {
                "id": "string",
                "name": "string"
              },
              "externalValue": {
                "id": "string",
                "name": "string"
              }
            }
          }
        }
        ```

        **Valid Example**

        This example includes only a `value` field.

        ```json
        {
          "examples": {
            "example-1": {
              "value": {
                "id": "string",
                "name": "string"
              }
            }
          }
        }
        ```
      message: Examples must have either "value" or "externalValue" field.
      fixSuggestion: >-
        For each OAS3 example, provide either an inline `value` or a pointer `externalValue`, not both; remove the redundant field.
      formats:
        - oas3

    array-items:
      given:
        - "#All_Array_Item"
      severity: error
      then:
        function: truthy
        field: items
      description: |-
        Schemas with `type: array`, require a sibling `items` field.

        **Recommended:** Yes

        **Good Example**

        ```yaml
        TheGoodModel:
          type: object
          properties:
            favoriteColorSets:
              type: array
              items:
                type: array
                items: {}
        ```

        **Bad Example**

        ```yaml
        TheBadModel:
          type: object
          properties:
            favoriteColorSets:
              type: array
              items:
                type: array
        ```
      message: 'Schemas with "type: array", require a sibling "items" field'
      fixSuggestion: >-
        Add an `items` schema under every `type: array` (and nest `items` for arrays of arrays) so element types are unambiguous.

    path-parameters-on-path-only:
      given:
        - "$.paths[*][*].parameters[?(@.in == 'path')]"
      severity: warn
      then:
        function: falsy
      description: |-
        Path parameters should be defined on the path level instead of the operation level.

        **Invalid Example**

        The `user_id` path parameter on line 8 should not be included with the `patch` operation.

        ```json
        {
          "patch": {
            "parameters": [
              {
                "schema": {
                  "type": "integer"
                },
                "name": "user_id",
                "in": "path"
              }
            ]
          }
        }
        ```

        **Valid Example**

        The `user-id` path parameter is correctly located at the path level.

        ```json
        {
          "paths": {
            "/users/{userId}": {
              "parameters": [
                {
                  "schema": {
                    "type": "integer"
                  },
                  "name": "user_id",
                  "in": "path"
                }
              ]
            }
          }
        }
        ```
      message: Path parameters should be defined on the path level.
      fixSuggestion: >-
        Move `in: path` parameters from individual operations to the path item’s `parameters` so all methods share the same path template.

    paths-no-query-params:
      given:
        - "$.paths"
      severity: warn
      then:
        function: pattern
        functionOptions:
          notMatch: '\?'
        field: "@key"
      description: |-
        Paths should not have query parameters in them. They should be defined separately in the OpenAPI.

        **Invalid Example**

        ```json
        {
          "/users/{?id}": {
        ```

        **Valid Example**

        ```json
        {
          "parameters": [
            {
              "schema": {
                "type": "string"
              },
              "name": "id",
              "in": "path",
              "required": true,
              "description": "User's ID"
            }
          ]
        }
        ```
      message: Paths should not have query parameters in them. They should be defined separately in the OpenAPI.
      fixSuggestion: >-
        Remove `?` and query-like segments from `paths` keys; model query fields with `parameters` using `in: query`.

    path-casing:
      given:
        - $.paths
      severity: error
      then:
        function: pattern
        functionOptions:
          match: '^\/([a-z0-9]+(-[a-z0-9]+)*)?(\/[a-z0-9]+(-[a-z0-9]+)*|\/\{.+\})*$'
        field: '@key'
      description: |-
        Paths must be `kebab-case`, with hyphens separating words.

        **Invalid Example**

        `userInfo` must be separated with a hyphen.

        ```json
        {
            "/userInfo": {
                "post: }
               ....
        }
        ```

        **Valid Example**

        ```json
        {
            "/user-info": {
               "post: }
               ....
        }
        ```
      message: Paths must be kebab-case
      fixSuggestion: >-
        Use lowercase segments with hyphens between words (e.g. `/user-profiles` not `/userProfiles` or `/user_profiles`).

    resource-names-plural:
      given:
        - $.paths
      severity: warn
      then:
        function: pattern
        functionOptions:
          match: '^((\/v\d+)*((\/[\w+-]*s)(\/\{.*\})*)*)$'
        field: '@key'
      description: |-
        Resource names should generally be plural.

        **Invalid Example**

        ```json
        {
            "paths": {
              "/user":
            }
          }
        ```

        **Valid Example**

        ```json
        {
            "paths": {
              "/users":
            }
        }
        ```
      message: Resource names should generally be plural
      fixSuggestion: >-
        Prefer plural collection paths (e.g. `/users`, `/orders`) unless the path is a singleton resource clearly named in your API style guide.

    paths-no-http-verbs:
      given:
        - $.paths
      severity: error
      then:
        function: pattern
        functionOptions:
          notMatch: >-
            \b(GET|PUT|POST|DELETE|LIST|CREATE|REMOVE|get|put|post|delete|list|create|remove|Get|Put|Post|Delete|List|Create|Remove)\b
        field: '@key'
      description: >-
        Verbs such as `get`, `delete`, and `put` must not be included in paths
        because this information is conveyed by the HTTP method.


        **Invalid Example**


        The path contains the verb `get`.


        ```json

        {
            "/getUsers": {
               "post: }
               ....
        }

        ```


        **Valid Example**


        ```json

        {
            "/user": {
               "post: }
               ....
        }

        ```
      message: Paths must not have HTTP verbs in them
      fixSuggestion: >-
        Encode the action in the HTTP method and noun-based resources (e.g. `GET /users` not `/getUsers`); rename path segments to remove verb words.

    paths-avoid-special-characters:
      given:
        - $.paths
      severity: warn
      then:
        function: pattern
        functionOptions:
          notMatch: '^(.*)([\$&+,;=?@%]+)(.*)$'
          match: ''
        field: '@key'
      description: >-
        Paths should not contain special characters, such as `$` `&` `+` `,` `;`
        `=` `?` and `@%`.


        **Invalid Example**


        The path contains an ampersand.


        ```json

        {
            "/user&info": {
               "post: }
               ....
        }

        ```


        **Valid Example**


        ```json

        {
            "/user": {
               "post: }
               ....
        }

        ```
      message: Avoid using special characters in paths
      fixSuggestion: >-
        Use simple path segments; avoid `& $ + , ; = ? @ %` in segment names—split concepts into extra path parts or query parameters instead.
